<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATHAREi — Thank You</title>
  <link rel="icon" type="image/png" href="images/misc/Catharei_logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="toasts.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0b0b; --bg2: #131313; --bg3: #1c1c1c; --border: #252525;
      --accent: #D4AF37; --accent2: #C5A028; --text: #f0ede8; --muted: #888;
      --font: 'Outfit', sans-serif; --serif: 'Playfair Display', serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

    .thankview {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
      padding: 60px 40px; text-align: center; max-width: 500px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative;
    }
    .check-icon {
      width: 80px; height: 80px; background: rgba(74,222,128,0.1); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;
      color: #4ade80; animation: scaleIn 0.5s ease-out;
    }
    .check-icon svg { width: 40px; height: 40px; fill: currentColor; }
    
    h1 { font-family: var(--serif); font-size: 2.2rem; color: var(--accent); margin-bottom: 15px; }
    p { color: var(--muted); line-height: 1.6; margin-bottom: 30px; }

    .order-card {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 30px; display: inline-block; width: 100%;
    }
    .order-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
    .order-card .number { font-family: var(--font); font-size: 1.8rem; font-weight: 700; color: var(--text); }

    .btn {
      display: inline-block; padding: 14px 30px; background: var(--accent); color: #000;
      text-decoration: none; border-radius: 8px; font-weight: 700; transition: all 0.2s;
    }
    .btn:hover { background: var(--accent2); transform: translateY(-2px); }

    @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* Floating particles for flair */
    .particle { position: absolute; background: var(--accent); border-radius: 50%; pointer-events: none; opacity: 0.4; }
  </style>
</head>
<body>

  <div class="thankview" id="status-card">
    <div class="check-icon" id="status-icon">
      <svg viewBox="0 0 24 24" id="icon-path"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <h1 id="status-title" data-i18n="thank.title">Thank You!</h1>
    <p id="status-msg">Your order has been accepted and is being prepared with love. We'll notify you once it's on the way.</p>
    
    <div class="order-card">
      <span class="label">Order Number</span>
      <span class="number" id="ord-num"># ———</span>
    </div>

    <a href="index.html" class="btn" data-i18n="nav.home">Back to Menu</a>
  </div>

  <script src="script.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderNum = urlParams.get('num');
    const status = urlParams.get('status');

    if (orderNum) {
      document.getElementById('ord-num').textContent = '#' + orderNum;
    }

    if (status === 'rejected') {
      // Update UI for Rejected State
      const title = document.getElementById('status-title');
      const msg = document.getElementById('status-msg');
      const icon = document.getElementById('status-icon');
      const iconPath = document.getElementById('icon-path');

      title.textContent = translations[currentLang]["status.sorryTitle"] || "Order Update";
      title.removeAttribute('data-i18n'); // prevent override
      
      msg.textContent = translations[currentLang]["status.sorryBody"] || "We are sorry, but your order couldn't be accepted.";
      
      icon.style.color = 'var(--red)';
      icon.style.background = 'rgba(248,113,113,0.1)';
      iconPath.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>'; // Warning/Info icon
      
      document.documentElement.style.setProperty('--accent', 'var(--red)');
    } else {
       // Success Message (ensure translations)
       if(currentLang === 'ar') {
         document.getElementById('status-title').textContent = "شكراً لك!";
         document.getElementById('status-msg').textContent = "لقد تم قبول طلبك ويتم تحضيره بكل حب. سنقوم بإخطارك بمجرد إرساله.";
       }
    }
  </script>
</body>
</html>
